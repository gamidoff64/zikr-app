name: Build APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    # ArtemSBulgakov/buildozer-action требует ubuntu-latest
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Кэш глобальной папки buildozer — Android NDK и SDK весят несколько ГБ.
      # Ключ по хэшу buildozer.spec: если конфиг не менялся, кэш переиспользуется.
      - name: Cache buildozer global directory
        uses: actions/cache@v4
        with:
          path: .buildozer_global
          key: buildozer-global-${{ hashFiles('buildozer.spec') }}

      # Ключевой шаг: buildozer запускается ВНУТРИ официального Docker-образа
      # kivy/buildozer. В нём уже есть:
      #   - Android SDK с принятыми лицензиями
      #   - Android NDK
      #   - build-tools нужной версии
      #   - Java, Cython, python-for-android
      # Именно поэтому не нужно setup-android, sdkmanager, принятие лицензий вручную.
      - name: Build APK with Buildozer (Docker)
        uses: ArtemSBulgakov/buildozer-action@v1
        id: buildozer
        with:
          command: buildozer android debug
          # stable = последний стабильный релиз buildozer из PyPI
          buildozer_version: stable

      # APK сохраняем как artifact — скачать со страницы Actions кнопкой Download
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: zikr-app-debug
          path: ${{ steps.buildozer.outputs.filename }}
          retention-days: 30
