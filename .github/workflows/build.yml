name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      # digreatbrian/buildozer-action@v2 — composite action (не Docker).
      # Сам устанавливает Java 17, системные зависимости, Cython 0.29.33, buildozer.
      # python-version: 3.8 — наиболее совместимая версия с Kivy/python-for-android.
      - name: Build APK
        uses: digreatbrian/buildozer-action@v2
        with:
          python-version: '3.8'
          buildozer-cmd: buildozer -v android debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: zikr-app-debug
          path: ./bin/*.apk
          retention-days: 30
