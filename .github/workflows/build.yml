name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  PYTHONFORANDROID_PREREQUISITES_INSTALL_INTERACTIVE: 0

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # Ставим Android SDK через официальный action —
      # он кладёт SDK в $ANDROID_HOME и настраивает sdkmanager
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # Принимаем лицензии в $ANDROID_HOME/licenses/ —
      # именно туда смотрит sdkmanager из этого SDK
      - name: Accept SDK licenses and install build-tools 33.0.2
        run: |
          mkdir -p "$ANDROID_HOME/licenses"
          # Все актуальные хэши android-sdk-license (не меняются, публичные)
          printf "24333f8a63b6825ea9c5514f83c2829b004d1fee\n8933bad161af4178b1185d1a37fbf41ea5269c55\nd56f5187479451eabf01fb78af6dfcb131a6481e\n" \
            > "$ANDROID_HOME/licenses/android-sdk-license"
          printf "84831b9409646a918e30573bab4c9c91346d8abd\n504667f4c0de7af1a06de9f4b1727b84351f2910\n" \
            > "$ANDROID_HOME/licenses/android-sdk-preview-license"

          # Устанавливаем ТОЛЬКО 33.0.2 — buildozer возьмёт её как единственную
          sdkmanager "build-tools;33.0.2" "platforms;android-33" "platform-tools"

          echo "=== Установленные build-tools ==="
          ls "$ANDROID_HOME/build-tools/"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y automake libltdl-dev

      # buildozer 1.5.0 — стабильная версия, не форсирует build-tools 37
      # cython 0.29.33 — совместим с Kivy 2.x и python-for-android
      - name: Install Buildozer 1.5.0 and Cython
        run: |
          pip install "buildozer==1.5.0" "cython==0.29.33"

      # Указываем buildozer использовать уже готовый SDK, не скачивать свой.
      # ANDROIDSDK — переменная которую читает buildozer (не ANDROID_SDK_ROOT!)
      - name: Build APK
        run: buildozer android debug
        env:
          ANDROIDSDK: ${{ env.ANDROID_HOME }}
          ANDROIDNDK: ${{ env.ANDROID_HOME }}/ndk/25.2.9519653

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: zikr-app-debug
          path: bin/*.apk
          retention-days: 30
