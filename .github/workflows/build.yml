name: Build APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Java 17 нужна для Android toolchain
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # Официальный action от Google: устанавливает Android SDK,
      # sdkmanager, platform-tools. После него SDK уже на месте.
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      # Принимаем все лицензии SDK — без этого build-tools не ставятся.
      # "yes |" автоматически отвечает "y" на все вопросы.
      # "|| true" чтобы шаг не падал, если часть лицензий уже принята.
      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses || true

      # Ставим build-tools 34.0.0 явно — до того как buildozer начнёт
      # скачивать свою версию. Так SDK уже будет в кэше.
      - name: Install Android build-tools 34.0.0
        run: sdkmanager "build-tools;34.0.0" "platforms;android-34"

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            git zip unzip \
            python3-pip python3-setuptools \
            autoconf automake libtool \
            libffi-dev libssl-dev \
            libsqlite3-dev \
            pkg-config \
            zlib1g-dev \
            libncurses5-dev libncursesw5-dev \
            cmake ccache

      - name: Install Buildozer and Cython
        run: |
          pip3 install --upgrade pip
          pip3 install buildozer
          pip3 install "cython==0.29.37"

      # Кэшируем .buildozer — Android NDK и скомпилированные пакеты.
      # Без кэша каждая сборка качает ~3 ГБ.
      - name: Cache buildozer directory
        uses: actions/cache@v4
        with:
          path: .buildozer
          key: buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-${{ runner.os }}-

      # Передаём buildozer путь к уже установленному SDK —
      # он не будет скачивать своё, возьмёт готовое.
      - name: Build APK
        run: buildozer android debug
        env:
          ANDROID_SDK_ROOT: ${{ env.ANDROID_HOME }}
          BUILDOZER_WARN_ON_ROOT: "false"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: zikr-app-debug
          path: bin/*.apk
          retention-days: 30
